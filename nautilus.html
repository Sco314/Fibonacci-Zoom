<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nautilus Shell Preview</title>
<style>
body {
  background: #0b0f1a;
  color: #f1f5f9;
  font-family: 'Segoe UI', system-ui, sans-serif;
  margin: 0; padding: 40px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 28px; font-weight: 300;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fde68a, #fb923c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center; color: #94a3b8; font-size: 14px;
  margin-bottom: 40px;
}
.grid {
  display: flex; flex-wrap: wrap;
  gap: 24px; justify-content: center;
  max-width: 1200px; margin: 0 auto;
}
.shell-card {
  background: rgba(17, 24, 39, 0.85);
  border: 1px solid rgba(51, 65, 85, 0.7);
  border-radius: 14px;
  padding: 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  width: 200px;
  transition: all 0.3s;
}
.shell-card:hover {
  border-color: #f5a623;
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.shell-label {
  font-size: 13px; color: #94a3b8;
  text-align: center;
}
.shell-color {
  font-family: monospace; font-size: 10px;
  color: #475569;
}
.size-row {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
  margin-top: 40px; padding: 30px;
  background: rgba(17, 24, 39, 0.5);
  border-radius: 14px;
  max-width: 900px; margin-left: auto; margin-right: auto;
}
.size-row h2 {
  font-size: 16px; font-weight: 400; color: #94a3b8;
  margin: 0;
}
.sizes {
  display: flex; gap: 20px; align-items: flex-end;
  flex-wrap: wrap; justify-content: center;
}
.size-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.size-item span { font-size: 10px; color: #475569; }
</style>
</head>
<body>

<h1>Nautilus Shell Sprites</h1>
<p class="subtitle">SVG nautilus shells for Fibonacci Zoom — modeled on the chambered nautilus cross-section</p>

<div class="grid" id="shellGrid"></div>

<div class="size-row">
  <h2>Size comparison (game use)</h2>
  <div class="sizes" id="sizeRow"></div>
</div>

<script>
const COLORS = [
  [59,130,246],   // blue
  [16,185,129],   // emerald
  [245,158,11],   // amber
  [239,68,68],    // red
  [139,92,246],   // violet
  [236,72,153],   // pink
  [6,182,212],    // cyan
  [132,204,22],   // lime
  [249,115,22],   // orange
  [99,102,241],   // indigo
];
const COLOR_NAMES = [
  'Blue','Emerald','Amber','Red','Violet',
  'Pink','Cyan','Lime','Orange','Indigo'
];
const EXTRA = [
  [[218,165,32],  'Goldenrod'],
  [[205,133,63],  'Peru (natural)'],
  [[168,230,207], 'Teal (app)'],
  [[251,191,36],  'Golden amber'],
  [[180,140,100], 'Fossil'],
];

/**
 * Creates a nautilus shell SVG matching the reference cross-section:
 * - Teardrop/comma outer silhouette
 * - Logarithmic spiral from center outward
 * - Curved chamber walls (septa) connecting spiral to outer shell
 * - Filled chambers with alternating shade
 */
function createNautilusSVG(color, size) {
  const [R, G, B] = color;
  const s = size || 140;

  // Color variants
  const fill   = `rgb(${R},${G},${B})`;
  const light  = `rgb(${Math.min(255,R+35)},${Math.min(255,G+35)},${Math.min(255,B+35)})`;
  const dark   = `rgb(${Math.max(0,R-50)},${Math.max(0,G-50)},${Math.max(0,B-50)})`;
  const stroke = `rgb(${Math.max(0,R-80)},${Math.max(0,G-80)},${Math.max(0,B-80)})`;
  const hi     = `rgba(${Math.min(255,R+90)},${Math.min(255,G+90)},${Math.min(255,B+90)},0.35)`;

  // Spiral center (offset right and down from geometric center, like real nautilus)
  const cx = s * 0.52, cy = s * 0.56;

  // Golden ratio for logarithmic spiral
  const phi = 1.618;
  const k = Math.log(phi) / (Math.PI / 2); // growth per radian

  // Generate spiral points (from center outward)
  function spiralR(angle) {
    return s * 0.028 * Math.exp(k * angle);
  }
  function spiralPt(angle) {
    const r = spiralR(angle);
    return [cx + r * Math.cos(angle), cy - r * Math.sin(angle)];
  }

  // Outer shell silhouette — teardrop shape
  // Built by extending the spiral outward and closing with a smooth curve
  const outerStartAngle = -0.3;
  const outerEndAngle = Math.PI * 3.6;

  let outerPath = '';
  const outerPts = [];
  for (let a = outerStartAngle; a <= outerEndAngle; a += 0.05) {
    const r = spiralR(a) * 1.15; // slightly outside the spiral
    const x = cx + r * Math.cos(a);
    const y = cy - r * Math.sin(a);
    if (r < s * 0.48) outerPts.push([x, y]);
  }

  // Build the teardrop: spiral points + a curved top
  // The "lip" of the shell extends up and curves back
  const lastPt = outerPts[outerPts.length - 1];
  const tipX = s * 0.42, tipY = s * 0.03; // top of teardrop
  const lipPath = `M${outerPts[0][0]},${outerPts[0][1]} ` +
    outerPts.map(p => `L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') +
    ` C${lastPt[0]},${lastPt[1]-s*0.15} ${tipX+s*0.15},${tipY+s*0.05} ${tipX},${tipY}` +
    ` C${tipX-s*0.12},${tipY+s*0.02} ${outerPts[0][0]-s*0.08},${outerPts[0][1]-s*0.15} ${outerPts[0][0]},${outerPts[0][1]}`;

  // Chamber walls (septa) — curved lines from spiral to outer shell
  // Each septum is at a quarter-turn interval
  let septa = '';
  const numChambers = 11;
  for (let i = 1; i < numChambers; i++) {
    const angle = outerStartAngle + i * (Math.PI / 2);
    if (spiralR(angle) > s * 0.44) continue;

    const innerR = spiralR(angle) * 0.85;
    const outerR = spiralR(angle) * 1.15;

    // Septum is a curved line from inner to outer
    const ix = cx + innerR * Math.cos(angle);
    const iy = cy - innerR * Math.sin(angle);
    const ox = cx + outerR * Math.cos(angle);
    const oy = cy - outerR * Math.sin(angle);

    // Curve the septum slightly (concave toward the center)
    const midAngle = angle + 0.15;
    const midR = (innerR + outerR) / 2;
    const mx = cx + midR * Math.cos(midAngle);
    const my = cy - midR * Math.sin(midAngle);

    septa += `<path d="M${ix.toFixed(1)},${iy.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${ox.toFixed(1)},${oy.toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="${Math.max(1, s*0.014)}" stroke-linecap="round"/>`;
  }

  // Spiral line itself
  let spiralLine = `M${spiralPt(0).join(',')}`;
  for (let a = 0.1; a <= outerEndAngle; a += 0.08) {
    const r = spiralR(a);
    if (r > s * 0.46) break;
    const [x, y] = spiralPt(a);
    spiralLine += ` L${x.toFixed(1)},${y.toFixed(1)}`;
  }

  const uid = `n${R}_${G}_${B}_${s}`;

  return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_${uid}" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="${light}"/>
      <stop offset="70%" stop-color="${fill}"/>
      <stop offset="100%" stop-color="${dark}"/>
    </radialGradient>
  </defs>
  <!-- Outer shell body (teardrop) -->
  <path d="${lipPath}" fill="url(#bg_${uid})" stroke="${stroke}" stroke-width="${Math.max(1.5, s*0.018)}"/>
  <!-- Chamber walls (septa) -->
  ${septa}
  <!-- Spiral line -->
  <path d="${spiralLine}" fill="none" stroke="${stroke}" stroke-width="${Math.max(1.2, s*0.015)}" stroke-linecap="round"/>
  <!-- Center whorl -->
  <circle cx="${cx}" cy="${cy}" r="${s*0.022}" fill="${stroke}"/>
  <!-- Highlight sheen -->
  <ellipse cx="${s*0.36}" cy="${s*0.25}" rx="${s*0.07}" ry="${s*0.14}"
           fill="${hi}" transform="rotate(-30 ${s*0.36} ${s*0.25})"/>
</svg>`;
}

// Render grid
const grid = document.getElementById('shellGrid');
const all = [
  ...COLORS.map((c, i) => [c, COLOR_NAMES[i]]),
  ...EXTRA,
];

all.forEach(([color, name]) => {
  const card = document.createElement('div');
  card.className = 'shell-card';
  card.innerHTML = `
    <div style="width:140px;height:140px;">${createNautilusSVG(color, 140)}</div>
    <div class="shell-label">${name}</div>
    <div class="shell-color">rgb(${color.join(',')})</div>
  `;
  grid.appendChild(card);
});

// Size comparison
const sizeRow = document.getElementById('sizeRow');
[28, 36, 44, 64, 96, 140].forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `
    <div style="width:${sz}px;height:${sz}px;">${createNautilusSVG([245,158,11], sz)}</div>
    <span>${sz}px</span>
  `;
  sizeRow.appendChild(item);
});
</script>
</body>
</html>
