<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nautilus Shell Preview</title>
<style>
body {
  background: #0b0f1a;
  color: #f1f5f9;
  font-family: 'Segoe UI', system-ui, sans-serif;
  margin: 0; padding: 40px 20px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 28px; font-weight: 300;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fde68a, #fb923c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 40px; }
.grid {
  display: flex; flex-wrap: wrap;
  gap: 20px; justify-content: center;
  max-width: 1100px; margin: 0 auto;
}
.shell-card {
  background: rgba(17,24,39,0.85);
  border: 1px solid rgba(51,65,85,0.7);
  border-radius: 14px;
  padding: 16px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  width: 160px;
  transition: all 0.3s;
}
.shell-card:hover {
  border-color: #f5a623;
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
.shell-label { font-size: 12px; color: #94a3b8; }
.shell-color { font-family: monospace; font-size: 9px; color: #475569; }
.section {
  max-width: 1100px; margin: 40px auto 0;
  padding: 24px;
  background: rgba(17,24,39,0.5);
  border-radius: 14px;
}
.section h2 { font-size: 16px; font-weight: 400; color: #94a3b8; margin: 0 0 16px; text-align: center; }
.sizes {
  display: flex; gap: 20px; align-items: flex-end;
  justify-content: center; flex-wrap: wrap;
}
.size-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.size-item span { font-size: 10px; color: #475569; }
.dark-bg { background: #0b0f1a; padding: 16px; border-radius: 10px; }
.light-bg { background: #f1f5f9; padding: 16px; border-radius: 10px; }
.bg-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
</style>
</head>
<body>

<h1>Nautilus Shell Sprites</h1>
<p class="subtitle">Based on your SVG nautilus silhouette — colorized for Fibonacci Zoom power-ups</p>

<div class="grid" id="shellGrid"></div>

<div class="section">
  <h2>Size comparison (amber, game sprite sizes)</h2>
  <div class="sizes" id="sizeRow"></div>
</div>

<div class="section">
  <h2>On dark vs light backgrounds</h2>
  <div class="bg-row">
    <div class="dark-bg" id="darkBg"></div>
    <div class="light-bg" id="lightBg"></div>
  </div>
</div>

<script>
const COLORS = [
  [59,130,246],[16,185,129],[245,158,11],[239,68,68],
  [139,92,246],[236,72,153],[6,182,212],[132,204,22],
  [249,115,22],[99,102,241],
];
const NAMES = ['Blue','Emerald','Amber','Red','Violet','Pink','Cyan','Lime','Orange','Indigo'];
const EXTRA = [
  [[218,165,32],'Goldenrod'],[[205,133,63],'Peru'],
  [[168,230,207],'Teal'],[[251,191,36],'Gold'],[[180,140,100],'Fossil'],
];

// Your SVG path data — the nautilus silhouette
// Extracted from the SVG you provided, scaled to fit a viewBox
function createNautilusSVG(color, size) {
  const [r,g,b] = color;
  const fill = `rgb(${r},${g},${b})`;
  const dark = `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
  const light = `rgba(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)},0.6)`;
  const s = size || 100;

  // The nautilus shell path from your SVG, normalized to ~0-100 viewBox
  // I'm tracing a clean nautilus shape inspired by your paths
  return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s*1.2}">
  <defs>
    <radialGradient id="rg${r}${g}${b}${s}" cx="40%" cy="45%" r="60%">
      <stop offset="0%" stop-color="${light}" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="${fill}"/>
      <stop offset="100%" stop-color="${dark}"/>
    </radialGradient>
  </defs>
  <!-- Outer shell silhouette — teardrop/comma shape -->
  <path d="
    M 52,118
    C 28,118 8,100 6,76
    C 4,56 10,38 24,24
    C 36,12 48,6 56,2
    C 64,6 74,14 78,26
    C 84,42 82,60 74,76
    C 70,84 64,94 58,104
    C 56,108 54,114 52,118
    Z"
    fill="url(#rg${r}${g}${b}${s})" stroke="${dark}" stroke-width="1.5"/>

  <!-- Inner spiral chambers — logarithmic spiral with septa -->
  <!-- Spiral curve -->
  <path d="
    M 48,72
    C 42,72 38,66 38,60
    C 38,54 42,48 48,46
    C 54,44 60,48 62,54
    C 64,58 62,64 58,68
    C 56,70 52,72 48,72
    Z"
    fill="none" stroke="${dark}" stroke-width="1.2"/>

  <!-- Chamber walls radiating from spiral center -->
  <path d="M 36,78 C 38,70 42,66 48,64" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 26,68 C 32,64 38,60 44,58" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 22,54 C 28,52 36,50 44,50" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 24,40 C 30,42 38,44 46,48" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 34,28 C 38,34 42,40 48,46" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 48,22 C 48,30 48,38 50,46" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 60,26 C 56,34 54,42 52,50" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 70,36 C 64,42 58,48 54,54" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 74,50 C 66,52 60,56 56,60" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 72,66 C 66,64 60,62 56,64" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 64,80 C 60,74 56,68 52,66" fill="none" stroke="${dark}" stroke-width="1.3"/>
  <path d="M 50,90 C 50,82 50,74 50,68" fill="none" stroke="${dark}" stroke-width="1.3"/>

  <!-- Outer spiral arc -->
  <path d="
    M 50,90
    C 30,88 16,74 14,56
    C 12,38 22,22 38,16
    C 54,10 70,18 76,34
    C 80,46 78,60 70,72
    C 64,80 56,86 50,90"
    fill="none" stroke="${dark}" stroke-width="1.5"/>

  <!-- Inner spiral arc -->
  <path d="
    M 50,80
    C 36,78 26,68 24,56
    C 22,44 28,32 40,26
    C 50,22 62,26 66,36
    C 70,44 68,54 62,62
    C 58,68 54,74 50,80"
    fill="none" stroke="${dark}" stroke-width="1.3"/>

  <!-- Innermost spiral -->
  <path d="
    M 50,72
    C 42,70 36,64 36,56
    C 36,48 42,42 50,40
    C 56,38 62,42 64,48
    C 66,54 62,60 58,64
    C 56,66 52,70 50,72"
    fill="none" stroke="${dark}" stroke-width="1.1"/>

  <!-- Center eye -->
  <circle cx="50" cy="56" r="2.5" fill="${dark}"/>

  <!-- Highlight sheen -->
  <ellipse cx="40" cy="30" rx="8" ry="14" fill="${light}" opacity="0.5" transform="rotate(-15 40 30)"/>
</svg>`;
}

// Render grid
const grid = document.getElementById('shellGrid');
[...COLORS.map((c,i) => [c,NAMES[i]]), ...EXTRA].forEach(([color, name]) => {
  const card = document.createElement('div');
  card.className = 'shell-card';
  card.innerHTML = `
    <div style="width:100px;height:120px;">${createNautilusSVG(color, 100)}</div>
    <div class="shell-label">${name}</div>
    <div class="shell-color">rgb(${color.join(',')})</div>
  `;
  grid.appendChild(card);
});

// Sizes
const sizeRow = document.getElementById('sizeRow');
[24, 32, 44, 64, 96].forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `
    <div style="width:${sz}px;height:${sz*1.2}px;">${createNautilusSVG([245,158,11], sz)}</div>
    <span>${sz}px</span>
  `;
  sizeRow.appendChild(item);
});

// Dark/light bg comparison
const demoColors = [[16,185,129],[245,158,11],[139,92,246]];
['darkBg','lightBg'].forEach(id => {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.gap = '16px';
  el.style.alignItems = 'center';
  demoColors.forEach(c => {
    const d = document.createElement('div');
    d.style.width = '64px'; d.style.height = '77px';
    d.innerHTML = createNautilusSVG(c, 64);
    el.appendChild(d);
  });
});
</script>
</body>
</html>
