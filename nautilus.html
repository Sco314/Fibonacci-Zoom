<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nautilus Shell Preview</title>
<style>
body {
  background: #0b0f1a;
  color: #f1f5f9;
  font-family: 'Segoe UI', system-ui, sans-serif;
  margin: 0; padding: 40px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 28px; font-weight: 300;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fde68a, #fb923c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center; color: #94a3b8; font-size: 14px;
  margin-bottom: 40px;
}
.grid {
  display: flex; flex-wrap: wrap;
  gap: 24px; justify-content: center;
  max-width: 1200px; margin: 0 auto;
}
.shell-card {
  background: rgba(17, 24, 39, 0.85);
  border: 1px solid rgba(51, 65, 85, 0.7);
  border-radius: 14px;
  padding: 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  width: 180px;
  transition: all 0.3s;
}
.shell-card:hover {
  border-color: #f5a623;
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.shell-card svg {
  width: 120px; height: 120px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}
.shell-label {
  font-size: 12px; color: #94a3b8;
  text-align: center;
}
.shell-color {
  font-family: monospace; font-size: 10px;
  color: #475569;
}
.size-row {
  display: flex; gap: 16px; align-items: flex-end;
  justify-content: center;
  margin-top: 40px; padding: 30px;
  background: rgba(17, 24, 39, 0.5);
  border-radius: 14px;
  max-width: 800px; margin-left: auto; margin-right: auto;
}
.size-row h2 {
  width: 100%; text-align: center;
  font-size: 16px; font-weight: 400; color: #94a3b8;
  margin-bottom: 10px;
}
.size-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.size-item span { font-size: 10px; color: #475569; }
</style>
</head>
<body>

<h1>Nautilus Shell Sprites</h1>
<p class="subtitle">SVG nautilus shells for Fibonacci Zoom power-ups — inspired by the chambered nautilus</p>

<div class="grid" id="shellGrid"></div>

<div class="size-row">
  <h2>Size comparison (game use)</h2>
  <div id="sizeRow" style="display:flex;gap:16px;align-items:flex-end;justify-content:center;width:100%;flex-wrap:wrap;"></div>
</div>

<script>
// Same color palette as fibonacciZoom.html
const COLORS = [
  [59,130,246],   // blue
  [16,185,129],   // emerald
  [245,158,11],   // amber
  [239,68,68],    // red
  [139,92,246],   // violet
  [236,72,153],   // pink
  [6,182,212],    // cyan
  [132,204,22],   // lime
  [249,115,22],   // orange
  [99,102,241],   // indigo
];

const COLOR_NAMES = [
  'Blue', 'Emerald', 'Amber', 'Red', 'Violet',
  'Pink', 'Cyan', 'Lime', 'Orange', 'Indigo'
];

// Extra nautilus-specific colors
const EXTRA_COLORS = [
  [[218,165,32],  'Goldenrod'],
  [[205,133,63],  'Peru (natural)'],
  [[192,192,192], 'Silver'],
  [[168,230,207], 'Teal (app accent)'],
  [[251,191,36],  'Golden amber'],
];

function createNautilusSVG(color, size) {
  const [r, g, b] = color;
  const base = `rgb(${r},${g},${b})`;
  const light = `rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},0.9)`;
  const dark = `rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},1)`;
  const vdark = `rgba(${Math.max(0,r-80)},${Math.max(0,g-80)},${Math.max(0,b-80)},1)`;
  const highlight = `rgba(${Math.min(255,r+100)},${Math.min(255,g+100)},${Math.min(255,b+100)},0.4)`;

  // Build chambered sections using arcs — mimics the nautilus cross-section
  // The spiral is built from concentric quarter-circles with dividing walls
  const s = size || 120;
  const cx = s/2, cy = s/2;

  let chambers = '';
  const numChambers = 9;

  for (let i = 0; i < numChambers; i++) {
    const t = i / numChambers;
    const outerR = (s * 0.46) * Math.pow(0.82, i);
    const innerR = (s * 0.46) * Math.pow(0.82, i + 1);
    const startAngle = -Math.PI/2 + i * (Math.PI * 0.55);
    const endAngle = startAngle + Math.PI * 0.55;

    // Chamber fill — gradient from light to dark inward
    const chamberColor = i % 2 === 0 ? base : light;
    const osx = cx + outerR * Math.cos(startAngle);
    const osy = cy + outerR * Math.sin(startAngle);
    const oex = cx + outerR * Math.cos(endAngle);
    const oey = cy + outerR * Math.sin(endAngle);
    const isx = cx + innerR * Math.cos(endAngle);
    const isy = cy + innerR * Math.sin(endAngle);
    const iex = cx + innerR * Math.cos(startAngle);
    const iey = cy + innerR * Math.sin(startAngle);

    chambers += `<path d="M${osx},${osy} A${outerR},${outerR} 0 0,1 ${oex},${oey} L${isx},${isy} A${innerR},${innerR} 0 0,0 ${iex},${iey} Z" fill="${chamberColor}" stroke="${dark}" stroke-width="${s*0.01}"/>`;
  }

  return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="ng_${r}_${g}_${b}" cx="35%" cy="40%">
        <stop offset="0%" stop-color="${light}"/>
        <stop offset="50%" stop-color="${base}"/>
        <stop offset="100%" stop-color="${dark}"/>
      </radialGradient>
    </defs>
    <!-- Outer shell shape -->
    <ellipse cx="${cx}" cy="${cy*0.95}" rx="${s*0.44}" ry="${s*0.47}"
             fill="url(#ng_${r}_${g}_${b})" stroke="${vdark}" stroke-width="${s*0.015}"/>
    <!-- Inner spiral chambers -->
    ${chambers}
    <!-- Center eye -->
    <circle cx="${cx*0.92}" cy="${cy*1.05}" r="${s*0.04}" fill="${vdark}"/>
    <!-- Highlight sheen -->
    <ellipse cx="${cx*0.75}" cy="${cy*0.65}" rx="${s*0.12}" ry="${s*0.2}"
             fill="${highlight}" transform="rotate(-20 ${cx*0.75} ${cy*0.65})"/>
  </svg>`;
}

// Simpler, cleaner nautilus — more like the flat vector reference image
function createNautilusCleanSVG(color, size) {
  const [r, g, b] = color;
  const s = size || 120;
  const base = `rgb(${r},${g},${b})`;
  const dark = `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
  const light = `rgba(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)},0.7)`;

  // Build a clean spiral shell using logarithmic spiral segments
  let spiralPath = '';
  const cx = s * 0.48, cy = s * 0.52;
  const phi = 1.618;
  const numSegs = 12;

  // Outer shell silhouette
  let outerPoints = [];
  for (let i = 0; i <= 60; i++) {
    const t = i / 60;
    const angle = t * Math.PI * 3.2 - Math.PI * 0.3;
    const radius = s * 0.08 * Math.pow(phi, t * 2.2);
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);
    if (radius < s * 0.48) outerPoints.push([x, y]);
  }

  // Shell outline path
  if (outerPoints.length > 2) {
    let d = `M${outerPoints[0][0]},${outerPoints[0][1]}`;
    for (let i = 1; i < outerPoints.length; i++) {
      d += ` L${outerPoints[i][0]},${outerPoints[i][1]}`;
    }
    // Close with a curved outer edge
    const last = outerPoints[outerPoints.length - 1];
    const first = outerPoints[0];
    d += ` Q${s*0.85},${s*0.15} ${last[0]},${last[1]}`;
    spiralPath = `<path d="${d}" fill="${base}" stroke="none"/>`;
  }

  // Chamber dividing lines
  let chamberLines = '';
  for (let i = 1; i < numSegs; i++) {
    const t = i / numSegs;
    const angle = t * Math.PI * 3.2 - Math.PI * 0.3;
    const innerR = s * 0.08 * Math.pow(phi, t * 2.2) * 0.3;
    const outerR = s * 0.08 * Math.pow(phi, t * 2.2);
    if (outerR > s * 0.48) continue;
    const x1 = cx + innerR * Math.cos(angle);
    const y1 = cy + innerR * Math.sin(angle);
    const x2 = cx + outerR * Math.cos(angle);
    const y2 = cy + outerR * Math.sin(angle);
    chamberLines += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${dark}" stroke-width="${s*0.02}" stroke-linecap="round"/>`;
  }

  return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer shell body -->
    <ellipse cx="${s*0.5}" cy="${s*0.48}" rx="${s*0.44}" ry="${s*0.46}"
             fill="${base}" stroke="${dark}" stroke-width="${s*0.02}"/>
    <!-- Spiral chambers -->
    ${spiralPath}
    ${chamberLines}
    <!-- Spiral line -->
    <path d="M${cx},${cy} ${outerPoints.map(p => `L${p[0]},${p[1]}`).join(' ')}"
          fill="none" stroke="${dark}" stroke-width="${s*0.02}" stroke-linecap="round"/>
    <!-- Highlight -->
    <ellipse cx="${s*0.38}" cy="${s*0.32}" rx="${s*0.1}" ry="${s*0.18}"
             fill="${light}" transform="rotate(-25 ${s*0.38} ${s*0.32})"/>
  </svg>`;
}

// Render all shells
const grid = document.getElementById('shellGrid');
const allColors = [
  ...COLORS.map((c, i) => [c, COLOR_NAMES[i]]),
  ...EXTRA_COLORS,
];

allColors.forEach(([color, name]) => {
  const card = document.createElement('div');
  card.className = 'shell-card';

  // Show clean version
  const svgHTML = createNautilusCleanSVG(color, 120);
  card.innerHTML = `
    ${svgHTML}
    <div class="shell-label">${name}</div>
    <div class="shell-color">rgb(${color.join(',')})</div>
  `;
  grid.appendChild(card);
});

// Size comparison row
const sizeRow = document.getElementById('sizeRow');
const sizes = [24, 32, 44, 64, 96];
const demoColor = [245, 158, 11]; // amber
sizes.forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `
    <div style="width:${sz}px;height:${sz}px;">${createNautilusCleanSVG(demoColor, sz)}</div>
    <span>${sz}px</span>
  `;
  sizeRow.appendChild(item);
});
</script>
</body>
</html>
